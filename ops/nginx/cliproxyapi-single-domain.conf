map $http_upgrade $connection_upgrade {
    default upgrade;
    "" close;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name token.zasdas.com 3.149.220.73 _;

    ssl_certificate /etc/nginx/ssl/token.zasdas.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/token.zasdas.com/key.pem;
    ssl_session_cache shared:CLIProxyAPISSL:10m;
    ssl_session_timeout 10m;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 100m;
    proxy_connect_timeout 60s;
    proxy_send_timeout 3600s;
    proxy_read_timeout 3600s;
    proxy_buffering off;
    proxy_request_buffering off;

    # CLIProxyAPI: OpenAI, Claude, Gemini, Codex, WebSocket, and management APIs.
    location /v1/ { proxy_pass http://127.0.0.1:8317; include /etc/nginx/proxy_params; }
    location /v1beta/ { proxy_pass http://127.0.0.1:8317; include /etc/nginx/proxy_params; }
    location /v1internal { proxy_pass http://127.0.0.1:8317; include /etc/nginx/proxy_params; }
    location = /v0/management { include /etc/nginx/management_allowlist.conf; proxy_pass http://127.0.0.1:8317; include /etc/nginx/proxy_params; }
    location /v0/management/ { include /etc/nginx/management_allowlist.conf; proxy_pass http://127.0.0.1:8317; include /etc/nginx/proxy_params; }
    location = /healthz { proxy_pass http://127.0.0.1:8317; include /etc/nginx/proxy_params; }
    location = /management.html { include /etc/nginx/management_allowlist.conf; proxy_pass http://127.0.0.1:8317; include /etc/nginx/proxy_params; }
    location = /keep-alive { proxy_pass http://127.0.0.1:8317; include /etc/nginx/proxy_params; }

    # CLIProxyAPI OAuth callback endpoints.
    location = /anthropic/callback { proxy_pass http://127.0.0.1:8317; include /etc/nginx/proxy_params; }
    location = /codex/callback { proxy_pass http://127.0.0.1:8317; include /etc/nginx/proxy_params; }
    location = /google/callback { proxy_pass http://127.0.0.1:8317; include /etc/nginx/proxy_params; }
    location = /iflow/callback { proxy_pass http://127.0.0.1:8317; include /etc/nginx/proxy_params; }
    location = /antigravity/callback { proxy_pass http://127.0.0.1:8317; include /etc/nginx/proxy_params; }

    # AMP routes. Do not proxy all /api/* because Key Portal owns its own /api/* endpoints.
    location = /api/provider { proxy_pass http://127.0.0.1:8317; include /etc/nginx/proxy_params; }
    location /api/provider/ { proxy_pass http://127.0.0.1:8317; include /etc/nginx/proxy_params; }
    location = /api/internal { proxy_pass http://127.0.0.1:8317; include /etc/nginx/proxy_params; }
    location /api/internal/ { proxy_pass http://127.0.0.1:8317; include /etc/nginx/proxy_params; }
    location = /api/user { proxy_pass http://127.0.0.1:8317; include /etc/nginx/proxy_params; }
    location /api/user/ { proxy_pass http://127.0.0.1:8317; include /etc/nginx/proxy_params; }
    location = /api/auth { proxy_pass http://127.0.0.1:8317; include /etc/nginx/proxy_params; }
    location /api/auth/ { proxy_pass http://127.0.0.1:8317; include /etc/nginx/proxy_params; }
    location = /api/meta { proxy_pass http://127.0.0.1:8317; include /etc/nginx/proxy_params; }
    location /api/meta/ { proxy_pass http://127.0.0.1:8317; include /etc/nginx/proxy_params; }
    location = /api/ads { proxy_pass http://127.0.0.1:8317; include /etc/nginx/proxy_params; }
    location /api/ads/ { proxy_pass http://127.0.0.1:8317; include /etc/nginx/proxy_params; }
    location = /api/telemetry { proxy_pass http://127.0.0.1:8317; include /etc/nginx/proxy_params; }
    location /api/telemetry/ { proxy_pass http://127.0.0.1:8317; include /etc/nginx/proxy_params; }
    location = /api/threads { proxy_pass http://127.0.0.1:8317; include /etc/nginx/proxy_params; }
    location /api/threads/ { proxy_pass http://127.0.0.1:8317; include /etc/nginx/proxy_params; }
    location = /api/otel { proxy_pass http://127.0.0.1:8317; include /etc/nginx/proxy_params; }
    location /api/otel/ { proxy_pass http://127.0.0.1:8317; include /etc/nginx/proxy_params; }
    location = /api/tab { proxy_pass http://127.0.0.1:8317; include /etc/nginx/proxy_params; }
    location /api/tab/ { proxy_pass http://127.0.0.1:8317; include /etc/nginx/proxy_params; }
    location = /threads { proxy_pass http://127.0.0.1:8317; include /etc/nginx/proxy_params; }
    location /threads/ { proxy_pass http://127.0.0.1:8317; include /etc/nginx/proxy_params; }
    location = /docs { proxy_pass http://127.0.0.1:8317; include /etc/nginx/proxy_params; }
    location /docs/ { proxy_pass http://127.0.0.1:8317; include /etc/nginx/proxy_params; }
    location = /settings { proxy_pass http://127.0.0.1:8317; include /etc/nginx/proxy_params; }
    location /settings/ { proxy_pass http://127.0.0.1:8317; include /etc/nginx/proxy_params; }
    location = /auth { proxy_pass http://127.0.0.1:8317; include /etc/nginx/proxy_params; }
    location /auth/ { proxy_pass http://127.0.0.1:8317; include /etc/nginx/proxy_params; }
    location = /threads.rss { proxy_pass http://127.0.0.1:8317; include /etc/nginx/proxy_params; }
    location = /news.rss { proxy_pass http://127.0.0.1:8317; include /etc/nginx/proxy_params; }

    # Key Portal owns the root page, static assets, Socket.IO, and portal /api/* endpoints.
    location / {
        include /etc/nginx/trusted_source_allowlist.conf;
        proxy_pass http://127.0.0.1:18080;
        include /etc/nginx/proxy_params;
    }
}
